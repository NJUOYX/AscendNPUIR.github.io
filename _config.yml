# Jekyll configuration for AscendNPUIR Documentation

# Site settings
title: AscendNPUIR Documentation
description: Comprehensive documentation for Ascend NPU Intermediate Representation
baseurl: "/AscendNPUIR.github.io"
url: "https://njuoyx.github.io"

# Theme settings
remote_theme: just-the-docs/just-the-docs@v0.4.0.rc3
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Just the Docs specific configuration
just_the_docs:
  # Enable dark mode
  color_scheme: auto
  # Navigation settings
  nav_external_links:
    - title: GitHub
      url: https://github.com/NJUOYX/AscendNPUIR.github.io
      hide_icon: false
  # Search settings
  search_enabled: true
  search_limit: 10
  # Footer settings
  footer_content: "&copy; 2026 AscendNPUIR Community. Distributed under Apache License 2.0."

# Navigation
nav:
  - "Home": index.md
  - "Getting Started":
    - "Installation Guide": installation.md
    - "Quick Start Tutorial": tutorials/quick-start.md
    - "Architecture Overview": architecture.md
  - "Core Concepts":
    - "Introduction": introduction.md
    - "Ascend NPU Dialects": dialects.md
    - "Compiler Passes": passes.md
  - "Advanced Topics":
    - "API Reference": api.md
    - "Cost Model":
      - "VFFusion Fuse方案设计方法": cost-model/cost-model.md
      - "Compute Score": cost-model/compute-score.md
      - "IO Score": cost-model/io-score.md
      - "Parallelism Compute": cost-model/parallelisim-compute.md
  - "Tutorials": tutorials.md
  - "Contributing": contributing.md

# Build settings
markdown: kramdown
encoding: utf-8

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE